name: Beta

on:
  push:
    branches:
      - main

env:
  XCODE_CONFIG: Beta
  TFL_API_APP_KEY: ${{ secrets.TFL_API_APP_KEY }}
  APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
  APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
  APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
  MATCH_GIT_BASIC_AUTHORIZATION_BASE64: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION_BASE64 }}
  MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-deploy-beta:
    runs-on: macos-26
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app
      - name: Confirm Xcode version
        run: xcodebuild -version
      - name: Install dependencies
        run: |
          brew install librsvg
          brew install imagemagick
      - name: Swift format lint
        run: Scripts/swift-format-lint.sh          
      - name: Fastlane commands
        run: |
          bundle install
          bundle update fastlane
          bundle exec fastlane unit_tests
          bundle exec fastlane add_badge_overlay
          bundle exec fastlane build
          bundle exec fastlane distribute