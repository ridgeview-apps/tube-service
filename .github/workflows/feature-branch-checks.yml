name: Feature branch checks

on:
  push:
    branches:
      - 'feature/**'    

env:
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true    

jobs:
  check-feature-branch:
    runs-on: macos-26
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app
      - name: Confirm Xcode version
        run: xcodebuild -version
      - name: Install dependencies
        run: |
          brew install git-secret
      - name: Git secret
        run: |
          echo "🔓 Unlocking secrets..."
          echo -n "$GPG_PRIVATE_KEY" | base64 --decode | gpg --import
          git secret reveal
      - name: Swift format lint
        run: Scripts/swift-format-lint.sh          
      - name: Fastlane commands
        run: |
          bundle install
          bundle update fastlane
          bundle exec fastlane unit_tests